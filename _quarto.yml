project:
  output-dir: docs
  render:
    - index.qmd

engine: julia

format:
  html:
    theme: zephyr
    toc: true
    toc-location: left
    toc-depth: 3
    code-tools: true
    code-copy: true
    code-overflow: wrap
    smooth-scroll: true
    fig-width: 9
    fig-height: 6
    highlight-style: github
    df-print: paged
    css: styles.css

execute:
  freeze: auto
  warning: false

bibliography: references.bib
